<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chicken Farm Tycoon - Prototype</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            /* Prevent default touch actions like refresh, swipe, etc. */
            touch-action: none;
        }

        #game-canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        #ui-layer {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            font-family: sans-serif;
            font-size: 18px;
            font-weight: bold;
            pointer-events: none; /* Let clicks pass through to canvas */
            z-index: 10;
        }

        /* Joystick UI */
        #joystick-zone {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            /* touch-action: none is also handled here just in case */
        }

        #joystick-base {
            position: absolute;
            width: 100px;
            height: 100px;
            background-color: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            display: none;
            pointer-events: none;
        }

        #joystick-stick {
            position: absolute;
            width: 40px;
            height: 40px;
            background-color: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            display: none;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="ui-layer">💰 골드: <span id="gold-count">0</span> | 📦 가방: <span id="bag-count">0</span>/<span id="max-capacity">10</span></div>

    <div id="joystick-zone"></div>
    <div id="joystick-base"></div>
    <div id="joystick-stick"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // 1. Scene, Camera, Renderer Initialization
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Sky blue background

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);

        // Isometric-style setup
        const cameraOffset = new THREE.Vector3(15, 20, 15);
        camera.position.copy(cameraOffset);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // Window resize handling
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // 2. Lights and Environment
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(10, 20, 10);
        scene.add(directionalLight);

        // Ground
        const groundGeo = new THREE.PlaneGeometry(50, 50);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x4CAF50 }); // Green grass
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        // 3. Game Objects
        // Player (Yellow Cube)
        const playerGeo = new THREE.BoxGeometry(1, 1, 1);
        const playerMat = new THREE.MeshStandardMaterial({ color: 0xFFFF00 });
        const player = new THREE.Mesh(playerGeo, playerMat);
        player.position.set(0, 0.5, 0); // Rest on the ground
        scene.add(player);

        // Feed Storage (Blue Cube) - 사료 창고
        const storageGeo = new THREE.BoxGeometry(2, 2, 2);
        const storageMat = new THREE.MeshStandardMaterial({ color: 0x0000FF });
        const storage = new THREE.Mesh(storageGeo, storageMat);
        storage.position.set(-5, 1, -5);
        scene.add(storage);

        // Feed Trough (Red Cube) - 밥통
        const troughGeo = new THREE.BoxGeometry(2, 1, 2);
        const troughMat = new THREE.MeshStandardMaterial({ color: 0xFF0000 });
        const trough = new THREE.Mesh(troughGeo, troughMat);
        trough.position.set(5, 0.5, 5);
        scene.add(trough);

        // Nests (Brown Cylinders)
        const nests = [];
        const nestGeo = new THREE.CylinderGeometry(1, 1, 0.2, 16);
        const nestMat = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
        const nestPositions = [
            { x: -5, z: 5 },
            { x: 0, z: 5 },
            { x: 5, z: 5 }
        ];

        nestPositions.forEach(pos => {
            const nest = new THREE.Mesh(nestGeo, nestMat);
            nest.position.set(pos.x, 0.1, pos.z);
            nest.userData = { hasEgg: false, isOccupied: false };
            scene.add(nest);
            nests.push(nest);
        });

        // Sell Zone (Green Flat Box)
        const sellZoneGeo = new THREE.BoxGeometry(4, 0.1, 4);
        const sellZoneMat = new THREE.MeshStandardMaterial({ color: 0x00FF00, transparent: true, opacity: 0.5 });
        const sellZone = new THREE.Mesh(sellZoneGeo, sellZoneMat);
        sellZone.position.set(0, 0.05, -10);
        scene.add(sellZone);

        // Egg Object Pool (Yellow Spheres)
        const eggPool = [];
        const eggGeo = new THREE.SphereGeometry(0.3, 16, 16);
        const eggMat = new THREE.MeshStandardMaterial({ color: 0xFFD700 });
        for (let i = 0; i < 10; i++) {
            const egg = new THREE.Mesh(eggGeo, eggMat);
            egg.visible = false;
            egg.userData = { nest: null };
            scene.add(egg);
            eggPool.push(egg);
        }

        // Chickens (White Spheres)
        const chickens = [];
        const chickenGeo = new THREE.SphereGeometry(0.5, 16, 16);
        const chickenMat = new THREE.MeshStandardMaterial({ color: 0xFFFFFF });

        for (let i = 0; i < 3; i++) {
            const chicken = new THREE.Mesh(chickenGeo, chickenMat);
            chicken.position.set(Math.random() * 10 - 5, 0.5, Math.random() * 10 - 5);
            chicken.userData = {
                state: 'WANDER',
                stateTimer: 0,
                target: null,
                currentNest: null,
                speed: 2
            };
            scene.add(chicken);
            chickens.push(chicken);
        }

        // 4. Game State & Logic
        const maxCapacity = 10;
        const carriedItems = []; // Contains { type: 'feed'|'egg', mesh: THREE.Mesh }
        const activeAnimations = []; // Contains animation objects
        const troughFeedMeshes = []; // Meshes visually placed on the trough
        let troughFeedCount = 0;

        const bagCountElement = document.getElementById('bag-count');
        const maxCapacityElement = document.getElementById('max-capacity');
        maxCapacityElement.innerText = maxCapacity;

        let goldCount = 0;
        const goldCountElement = document.getElementById('gold-count');

        let lastInteractTime = 0;
        let lastSellTime = 0;
        const INTERACT_INTERVAL = 0.5; // seconds
        const INTERACT_RADIUS = 3.0; // Distance to trigger interaction

        // Joystick State
        let isDragging = false;
        let startX = 0, startY = 0;
        let currentX = 0, currentY = 0;
        const joystickMaxRadius = 50;
        const moveVector = new THREE.Vector2(0, 0);

        // Joystick UI Elements
        const joystickZone = document.getElementById('joystick-zone');
        const joystickBase = document.getElementById('joystick-base');
        const joystickStick = document.getElementById('joystick-stick');

        // Touch Events
        joystickZone.addEventListener('pointerdown', (e) => {
            isDragging = true;
            startX = e.clientX;
            startY = e.clientY;
            currentX = e.clientX;
            currentY = e.clientY;

            joystickBase.style.display = 'block';
            joystickStick.style.display = 'block';
            joystickBase.style.left = startX + 'px';
            joystickBase.style.top = startY + 'px';
            joystickStick.style.left = startX + 'px';
            joystickStick.style.top = startY + 'px';

            updateJoystickState();
        });

        joystickZone.addEventListener('pointermove', (e) => {
            if (!isDragging) return;
            currentX = e.clientX;
            currentY = e.clientY;
            updateJoystickState();
        });

        joystickZone.addEventListener('pointerup', (e) => {
            isDragging = false;
            joystickBase.style.display = 'none';
            joystickStick.style.display = 'none';
            moveVector.set(0, 0);
        });

        joystickZone.addEventListener('pointercancel', (e) => {
            isDragging = false;
            joystickBase.style.display = 'none';
            joystickStick.style.display = 'none';
            moveVector.set(0, 0);
        });

        function updateJoystickState() {
            let dx = currentX - startX;
            let dy = currentY - startY;
            const distance = Math.sqrt(dx * dx + dy * dy);

            if (distance > joystickMaxRadius) {
                dx = (dx / distance) * joystickMaxRadius;
                dy = (dy / distance) * joystickMaxRadius;
            }

            joystickStick.style.left = (startX + dx) + 'px';
            joystickStick.style.top = (startY + dy) + 'px';

            // Normalize vector from -1 to 1
            moveVector.set(dx / joystickMaxRadius, dy / joystickMaxRadius);
        }

        function updateChicken(chicken, delta, time) {
            const data = chicken.userData;

            switch(data.state) {
                case 'WANDER':
                    if (data.stateTimer <= 0) {
                        // Pick a random direction
                        const angle = Math.random() * Math.PI * 2;
                        const dist = Math.random() * 2 + 1;
                        data.target = new THREE.Vector3(
                            chicken.position.x + Math.cos(angle) * dist,
                            chicken.position.y,
                            chicken.position.z + Math.sin(angle) * dist
                        );
                        // Stay in bounds roughly
                        data.target.x = Math.max(-20, Math.min(20, data.target.x));
                        data.target.z = Math.max(-20, Math.min(20, data.target.z));
                        data.stateTimer = Math.random() * 2 + 2; // Wander for 2-4 seconds
                    } else {
                        data.stateTimer -= delta;

                        if (data.target) {
                            const direction = new THREE.Vector3().subVectors(data.target, chicken.position);
                            direction.y = 0;
                            if (direction.length() > 0.1) {
                                direction.normalize();
                                chicken.position.addScaledVector(direction, data.speed * delta);
                            }
                        }

                        // Become hungry eventually (roughly 5-10 seconds total wandering)
                        // Simple logic: 10% chance per second to become hungry if not moving
                        if (data.stateTimer <= 0 && Math.random() < 0.5) {
                            data.state = 'HUNGRY';
                        }
                    }
                    break;
                case 'HUNGRY':
                    if (troughFeedCount > 0) {
                        data.target = trough.position.clone();
                        data.state = 'MOVE_TO_TROUGH';
                    } else {
                        // If no food, just wander a bit
                        data.state = 'WANDER';
                        data.stateTimer = 0;
                    }
                    break;
                case 'MOVE_TO_TROUGH':
                    if (chicken.position.distanceTo(trough.position) <= 2.0) {
                        data.state = 'EAT';
                        data.stateTimer = 2.0; // Eat for 2 seconds
                    } else {
                        const dirToTrough = new THREE.Vector3().subVectors(trough.position, chicken.position);
                        dirToTrough.y = 0;
                        if (dirToTrough.length() > 0) {
                            dirToTrough.normalize();
                            chicken.position.addScaledVector(dirToTrough, data.speed * delta);
                        }
                    }
                    break;
                case 'EAT':
                    if (data.stateTimer > 0) {
                        data.stateTimer -= delta;
                    } else {
                        if (troughFeedCount > 0) {
                            troughFeedCount--;

                            // Remove visual mesh from trough
                            if (troughFeedMeshes.length > 0) {
                                const mesh = troughFeedMeshes.pop();
                                scene.remove(mesh);
                            }

                            // Find an empty nest
                            let emptyNest = null;
                            for (const nest of nests) {
                                if (!nest.userData.hasEgg && !nest.userData.isOccupied) {
                                    emptyNest = nest;
                                    break;
                                }
                            }

                            if (emptyNest) {
                                emptyNest.userData.isOccupied = true;
                                data.currentNest = emptyNest;
                                data.target = emptyNest.position.clone();
                                data.state = 'MOVE_TO_NEST';
                            } else {
                                // No nests, just wander
                                data.state = 'WANDER';
                            }
                        } else {
                            data.state = 'HUNGRY'; // Someone else ate it
                        }
                    }
                    break;
                case 'MOVE_TO_NEST':
                    if (chicken.position.distanceTo(data.target) <= 1.0) {
                        data.state = 'LAY_EGG';
                        data.stateTimer = 3.0; // Wait 3 seconds
                    } else {
                        const dirToNest = new THREE.Vector3().subVectors(data.target, chicken.position);
                        dirToNest.y = 0;
                        if (dirToNest.length() > 0) {
                            dirToNest.normalize();
                            chicken.position.addScaledVector(dirToNest, data.speed * delta);
                        }
                    }
                    break;
                case 'LAY_EGG':
                    if (data.stateTimer > 0) {
                        data.stateTimer -= delta;
                    } else {
                        // Lay an egg
                        if (data.currentNest) {
                            data.currentNest.userData.hasEgg = true;
                            data.currentNest.userData.isOccupied = false; // Free up the nest

                            // Find available egg from pool
                            let availableEgg = null;
                            for (const egg of eggPool) {
                                if (!egg.visible) {
                                    availableEgg = egg;
                                    break;
                                }
                            }

                            if (availableEgg) {
                                availableEgg.position.copy(data.currentNest.position);
                                availableEgg.position.y += 0.5; // Sit on top of nest
                                availableEgg.visible = true;
                                availableEgg.userData.nest = data.currentNest;
                            }
                        }
                        data.state = 'WANDER';
                        data.stateTimer = 0;
                        data.currentNest = null;
                    }
                    break;
            }
        }

        function updateAnimations(delta) {
            for (let i = activeAnimations.length - 1; i >= 0; i--) {
                const anim = activeAnimations[i];
                anim.elapsed += delta;
                let progress = anim.elapsed / anim.duration;

                if (progress >= 1.0) {
                    progress = 1.0;
                }

                // Homing: Update target position if it's dynamic
                const currentTargetPos = typeof anim.targetPos === 'function' ? anim.targetPos() : anim.targetPos;

                // X and Z Lerp
                anim.mesh.position.x = THREE.MathUtils.lerp(anim.startPos.x, currentTargetPos.x, progress);
                anim.mesh.position.z = THREE.MathUtils.lerp(anim.startPos.z, currentTargetPos.z, progress);

                // Y Parabolic curve using Math.sin
                const baseHeight = THREE.MathUtils.lerp(anim.startPos.y, currentTargetPos.y, progress);
                const arcHeight = Math.sin(progress * Math.PI) * anim.peakHeight;
                anim.mesh.position.y = baseHeight + arcHeight;

                if (progress >= 1.0) {
                    if (anim.onComplete) anim.onComplete(anim.mesh);
                    activeAnimations.splice(i, 1);
                }
            }
        }

        // 5. Main Loop
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();
            const time = clock.getElapsedTime();

            updateAnimations(delta);

            // Update Chickens
            for (const chicken of chickens) {
                updateChicken(chicken, delta, time);
            }

            // Handle Movement based on Camera Direction
            if (moveVector.lengthSq() > 0.01) {
                // Get camera forward direction projected on XZ plane
                const cameraForward = new THREE.Vector3();
                camera.getWorldDirection(cameraForward);
                cameraForward.y = 0;
                cameraForward.normalize();

                // Get camera right direction
                // ThreeJS crossVectors(a, b) = a x b
                // camera forward x camera up = right vector
                const cameraRight = new THREE.Vector3();
                cameraRight.crossVectors(cameraForward, camera.up).normalize();

                // Calculate movement speed
                const speed = 5 * delta;

                // Move Vector mapping:
                // MoveVector.x represents Right(+) / Left(-)
                // MoveVector.y represents Down(+) / Up(-) in screen space
                // Screen Y decreases upwards, pushing stick up means moveVector.y is negative.
                // Thus we negate moveVector.y when mapping to Forward.
                // If it goes opposite for Left/Right, we would negate moveVector.x. Here forward x up = right.
                const movement = new THREE.Vector3(0, 0, 0);
                movement.addScaledVector(cameraRight, moveVector.x);
                movement.addScaledVector(cameraForward, -moveVector.y);

                if (movement.lengthSq() > 0) {
                    movement.normalize();
                    player.position.addScaledVector(movement, speed);
                }
            }

            // Smoothly move camera to follow player
            const targetCameraPos = player.position.clone().add(cameraOffset);
            camera.position.lerp(targetCameraPos, 5 * delta);

            // Auto-Interact Logic

            // Egg Collection
            for (const egg of eggPool) {
                if (egg.visible && player.position.distanceTo(egg.position) <= INTERACT_RADIUS && carriedItems.length < maxCapacity) {
                    egg.visible = false;
                    if (egg.userData.nest) {
                        egg.userData.nest.userData.hasEgg = false;
                    }

                    // Create a new visual egg for the animation/stack instead of using the pooled one directly
                    const carriedEgg = new THREE.Mesh(eggGeo, eggMat);
                    carriedEgg.position.copy(egg.position);
                    scene.add(carriedEgg);

                    activeAnimations.push({
                        mesh: carriedEgg,
                        startPos: carriedEgg.position.clone(),
                        targetPos: () => {
                            const pos = player.position.clone();
                            pos.y += 1 + carriedItems.length * 0.5;
                            return pos;
                        },
                        duration: 0.5,
                        elapsed: 0,
                        peakHeight: 2.0,
                        onComplete: (mesh) => {
                            scene.remove(mesh);
                            stackGroup.add(mesh);
                            mesh.position.set(0, 1 + carriedItems.length * 0.5, 0); // Local stack pos
                            carriedItems.push({ type: 'egg', mesh: mesh });
                            bagCountElement.innerText = carriedItems.length;
                        }
                    });
                }
            }

            // Sell Zone Logic
            if (player.position.distanceTo(sellZone.position) <= INTERACT_RADIUS) {
                // Find all eggs in inventory
                const eggIndexes = [];
                carriedItems.forEach((item, index) => {
                    if (item.type === 'egg') eggIndexes.push(index);
                });

                if (eggIndexes.length > 0 && time - lastSellTime >= 0.2) {
                    // Extract eggs
                    const eggsToSell = [];
                    // Iterate backwards to remove without messing up indexes
                    for (let i = eggIndexes.length - 1; i >= 0; i--) {
                        const index = eggIndexes[i];
                        const item = carriedItems[index];
                        eggsToSell.push(item);
                        carriedItems.splice(index, 1);
                        stackGroup.remove(item.mesh);
                        scene.add(item.mesh); // Re-add to scene for animation
                    }

                    // Update visuals of remaining items in stack
                    carriedItems.forEach((carried, index) => {
                        carried.mesh.position.set(0, 1 + index * 0.5, 0);
                    });
                    bagCountElement.innerText = carriedItems.length;

                    // Animate eggs to sell zone
                    eggsToSell.forEach((item, i) => {
                        const worldPos = new THREE.Vector3();
                        item.mesh.getWorldPosition(worldPos);
                        item.mesh.position.copy(worldPos);

                        activeAnimations.push({
                            mesh: item.mesh,
                            startPos: item.mesh.position.clone(),
                            targetPos: () => {
                                const pos = sellZone.position.clone();
                                pos.x += (Math.random() - 0.5) * 2; // Spread across sell zone
                                pos.z += (Math.random() - 0.5) * 2;
                                pos.y += 0.5;
                                return pos;
                            },
                            duration: 0.5,
                            elapsed: 0,
                            peakHeight: 1.5,
                            onComplete: (mesh) => {
                                goldCount += 10; // Add gold per egg
                                goldCountElement.innerText = goldCount;
                                scene.remove(mesh); // Remove the visual egg
                            }
                        });
                    });

                    lastSellTime = time;
                }
            }

            if (time - lastInteractTime >= INTERACT_INTERVAL) {
                // Check distance to storage
                if (player.position.distanceTo(storage.position) <= INTERACT_RADIUS) {
                    if (carriedItems.length < maxCapacity) {
                        const feedGeo = new THREE.BoxGeometry(0.5, 0.5, 0.5);
                        const feedMat = new THREE.MeshStandardMaterial({ color: 0x00FF00 }); // Green feed block
                        const feedMesh = new THREE.Mesh(feedGeo, feedMat);

                        feedMesh.position.copy(storage.position);
                        feedMesh.position.y += 1; // Start from top of storage
                        scene.add(feedMesh);

                        activeAnimations.push({
                            mesh: feedMesh,
                            startPos: feedMesh.position.clone(),
                            targetPos: () => {
                                const pos = player.position.clone();
                                pos.y += 1 + carriedItems.length * 0.5; // Stack vertically based on count
                                return pos;
                            },
                            duration: 0.5,
                            elapsed: 0,
                            peakHeight: 2.0,
                            onComplete: (mesh) => {
                                scene.remove(mesh);
                                stackGroup.add(mesh);
                                mesh.position.set(0, 1 + carriedItems.length * 0.5, 0); // Local stack pos
                                carriedItems.push({ type: 'feed', mesh: mesh });
                                bagCountElement.innerText = carriedItems.length;
                            }
                        });

                        lastInteractTime = time;
                    }
                }
                // Check distance to trough
                else if (player.position.distanceTo(trough.position) <= INTERACT_RADIUS) {
                    // Find a feed in inventory
                    const feedIndex = carriedItems.map(item => item.type).lastIndexOf('feed');
                    if (feedIndex !== -1) {
                        const item = carriedItems[feedIndex];
                        carriedItems.splice(feedIndex, 1);
                        stackGroup.remove(item.mesh);
                        scene.add(item.mesh);

                        // Need to update position to world coordinates for animation
                        const worldPos = new THREE.Vector3();
                        item.mesh.getWorldPosition(worldPos);
                        item.mesh.position.copy(worldPos);

                        // Update visuals of remaining items in stack
                        carriedItems.forEach((carried, index) => {
                            carried.mesh.position.set(0, 1 + index * 0.5, 0);
                        });
                        bagCountElement.innerText = carriedItems.length;

                        activeAnimations.push({
                            mesh: item.mesh,
                            startPos: item.mesh.position.clone(),
                            targetPos: () => {
                                const pos = trough.position.clone();
                                pos.x += (Math.random() - 0.5); // Randomize placement inside trough slightly
                                pos.z += (Math.random() - 0.5);
                                pos.y += 0.5; // Sit on top of trough
                                return pos;
                            },
                            duration: 0.5,
                            elapsed: 0,
                            peakHeight: 1.5,
                            onComplete: (mesh) => {
                                troughFeedCount++;
                                troughFeedMeshes.push(mesh);
                                // The mesh is now visually in the trough
                            }
                        });

                        lastInteractTime = time;
                    }
                }
            }

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
